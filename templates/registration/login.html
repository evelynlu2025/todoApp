{% extends "base.html" %}
{% block title %}Log in — Tesa{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Welcome back</h1>
  <p class="subtitle">Log in to manage your tasks.</p>
  {% if form.errors %}
    <div class="alert alert-error">Invalid username or password.</div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="id_username">Username</label>
      <input type="text" name="username" id="id_username" autofocus required>
    </div>
    <div class="form-group">
      <label for="id_password">Password</label>
      <input type="password" name="password" id="id_password" required>
    </div>
    <button class="btn btn-primary btn-block" type="submit">Log in</button>
  </form>
  <p class="auth-footer">Don't have an account? <a href="{% url 'register' %}">Sign up</a></p>
</div>
{% endblock %}
