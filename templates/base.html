{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#312e81">
  <title>{% block title %}Tesa{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="{% block body_class %}{% endblock %}">
  <nav class="navbar">
    <a href="{% url 'task_list' %}" class="nav-brand" aria-label="Tesa home">
      <span class="nav-brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      </span>
      Tesa
    </a>
    <div class="nav-links">
      {% if user.is_authenticated %}
        <span class="nav-user">{{ user.username }}</span>
        <a href="{% url 'logout' %}" class="btn btn-sm btn-outline">Log out</a>
      {% else %}
        <a href="{% url 'login' %}" class="btn btn-sm btn-outline">Log in</a>
        <a href="{% url 'register' %}" class="btn btn-sm btn-primary">Sign up</a>
      {% endif %}
    </div>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
