name: Log Merged PR

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  log-merged-pr:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Append entry to README
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          DATE="$(date -u +%Y-%m-%d)"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"

          ENTRY="- **${AUTHOR}** | ${DATE} | [#${PR_NUMBER} — ${PR_TITLE}](${PR_URL})"

          if ! grep -q "## Merged PR Log" README.md; then
            printf '\n## Merged PR Log\n\n' >> README.md
          fi

          echo "${ENTRY}" >> README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: log merged PR #${{ github.event.pull_request.number }}"
          git push
